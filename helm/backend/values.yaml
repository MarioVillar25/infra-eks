replicaCount: 1

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

# Esto es para manejar autoescalado según tráfico
autoscaling:
  enabled: false

# Esto es para comprobar si la app sigue viva
livenessProbe:
  httpGet:
    path: /actuator/health
    port: http

# Esto es para ver si está lista para recibir tráfico
readinessProbe:
  httpGet:
    path: /actuator/health
    port: http

httpRoute:
  enabled: false
  parentRefs: []
  hostnames: []
  rules: []
  annotations: {}